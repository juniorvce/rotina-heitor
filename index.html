<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rotina do Heitor V4</title>
<meta name="theme-color" content="#1d4ed8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg,#dbeafe,#ede9fe); min-height:100vh; padding-bottom:30px; }
  header { background: linear-gradient(135deg,#1d4ed8,#7c3aed); color:#fff; padding:18px 20px 14px; text-align:center; box-shadow:0 4px 12px rgba(0,0,0,.2); position:sticky; top:0; z-index:100; }
  header h1 { font-size:22px; font-weight:700; }
  header p { font-size:12px; opacity:.85; margin-top:3px; }
  .data-bar { background:#fff; padding:10px 16px; display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#555; border-bottom:1px solid #e5e7eb; flex-wrap:wrap; gap:6px; }
  .date-nav { display:flex; align-items:center; gap:12px; font-weight:700; color:#1d4ed8; }
  .btn-nav { background:#eff6ff; border:1px solid #bfdbfe; color:#1d4ed8; width:34px; height:34px; border-radius:8px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; }
  .btn-nav:active { background:#dbeafe; }
  .sync-status { font-size:11px; padding:4px 8px; border-radius:99px; background:#dcfce7; color:#166534; font-weight:600; cursor:pointer; }
  .sync-status.loading { background:#fef9c3; color:#854d0e; }
  .sync-status.erro { background:#fee2e2; color:#991b1b; }
  .container { padding:14px; max-width:480px; margin:0 auto; }
  .block { background:#fff; border-radius:16px; margin-bottom:14px; box-shadow:0 2px 10px rgba(0,0,0,.08); overflow:hidden; }
  .block-header { padding:12px 16px; display:flex; align-items:center; gap:10px; font-weight:700; font-size:16px; }
  .block-header .hora { font-size:20px; font-weight:800; }
  .block-header .badge { margin-left:auto; font-size:11px; padding:3px 8px; border-radius:99px; font-weight:600; }
  .badge.ok { background:#dcfce7; color:#166534; }
  .badge.pend { background:#fef3c7; color:#92400e; }
  .b-manha .block-header { background:linear-gradient(90deg,#fef9c3,#fef3c7); color:#78350f; }
  .b-escola .block-header { background:linear-gradient(90deg,#fee2e2,#fecaca); color:#991b1b; }
  .b-tarde .block-header { background:linear-gradient(90deg,#dbeafe,#bfdbfe); color:#1e3a8a; }
  .b-noite .block-header { background:linear-gradient(90deg,#ede9fe,#ddd6fe); color:#4c1d95; }
  .item { display:flex; align-items:center; padding:12px 16px; border-top:1px solid #f3f4f6; gap:12px; }
  .item.done { background:#f0fdf4; }
  .item-info { flex:1; }
  .item-name { font-size:15px; font-weight:600; color:#111827; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .item.done .item-name { text-decoration:line-through; color:#9ca3af; }
  .item-sub { font-size:11px; color:#6b7280; margin-top:2px; }
  .item-done-info { font-size:11px; color:#16a34a; margin-top:4px; font-weight:700; }
  .tag-ajuste { background:#fef08a; color:#854d0e; font-size:10px; padding:2px 6px; border-radius:4px; text-decoration:none !important; display:inline-block; }
  .check-btn { width:46px; height:46px; border-radius:50%; border:2.5px solid #d1d5db; background:#fff; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:#9ca3af; }
  .check-btn.checked { background:#22c55e; border-color:#22c55e; color:#fff; }
  .escola-aviso { padding:14px 16px; text-align:center; font-size:13px; color:#991b1b; font-weight:600; }
  .koide-info { background:#fffbeb; border-left:4px solid #f59e0b; margin:10px 16px 4px; padding:10px 12px; border-radius:0 8px 8px 0; font-size:12px; color:#78350f; }
  .koide-info strong { display:block; margin-bottom:3px; }
  .footer-info { text-align:center; font-size:11px; color:#9ca3af; margin-top:6px; padding:0 16px; line-height:1.5; }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.show { display:flex; }
  .modal { background:#fff; border-radius:20px; padding:24px; width:100%; max-width:340px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,.2); }
  .modal h3 { font-size:18px; margin-bottom:8px; color:#111827; }
  .modal p { font-size:13px; color:#4b5563; margin-bottom:18px; line-height:1.4; }
  .modal-btns { display:flex; flex-direction:column; gap:10px; }
  .modal-btns button { padding:14px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-pai { background:#1d4ed8; color:#fff; }
  .btn-mae { background:#db2777; color:#fff; }
  .btn-cancel { background:#f3f4f6; color:#374151; }
  .btn-smart { background:#f59e0b; color:#fff; }
</style>
</head>
<body>

<div class="modal-overlay" id="modalQuem">
  <div class="modal">
    <h3>Quem administrou?</h3>
    <p id="modalRemedio">Remedio</p>
    <div class="modal-btns">
      <button type="button" class="btn-pai" onclick="confirmarAdm('pai', event)">👨 Pai (Junior)</button>
      <button type="button" class="btn-mae" onclick="confirmarAdm('mae', event)">👩 Mae</button>
      <button type="button" class="btn-cancel" onclick="fecharModal('modalQuem', event)">Cancelar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalAjuste">
  <div class="modal">
    <h3>⚠️ Ajuste Inteligente</h3>
    <p id="textoAjuste">O remedio atrasou.</p>
    <div class="modal-btns">
      <button type="button" class="btn-smart" onclick="aceitarAjuste(event)">✅ Aceitar Sugestao</button>
      <button type="button" class="btn-cancel" onclick="recusarAjuste(event)">↩️ Manter Original</button>
    </div>
  </div>
</div>

<header>
  <h1>💊 Rotina do Heitor <span style="font-size:12px; background:#fef08a; color:#854d0e; padding:2px 6px; border-radius:4px; vertical-align:middle;">V4.0 Sync</span></h1>
  <p>8 anos · Dr. Thiago & Dra. Lucilene</p>
</header>

<div class="data-bar">
  <div class="date-nav">
    <button class="btn-nav" onclick="mudarDia(-1)">◀</button>
    <span id="dataHoje"></span>
    <button class="btn-nav" onclick="mudarDia(1)">▶</button>
  </div>
  <div id="syncStatus" class="sync-status loading" onclick="baixarDaNuvem()">🔄 Conectando...</div>
</div>

<div class="container" id="app"></div>

<script>
var STORAGE_KEY = 'heitor_rotina_v3';
var AJUSTES_KEY = 'heitor_ajustes_v3';
// AQUI ESTÁ A SUA NOVA URL INSERIDA DIRETAMENTE NO CÓDIGO:
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfTEPhW7-cQKQDi-uhQrL5co4ZRGBbSI7i2oC10eQmPA1maM6-dLs-ix3ZlJjCqCZQtw/exec';

var dataExibicao = new Date();
var itemAtual = null, nomeAtual = '', horaPrevistaAtual = '', ajustePendente = null;

var ROTINA_BASE = [
  { classe:'b-manha', emoji:'\u{1F305}', hora:'09:00', titulo:'Manha',
    koide:'Koide D - Esquema de reducao: Dias 1-2: 3x/dia | Dias 3-5: 2x/dia | Dia 6+: 1x e parar',
    itens:[
      {id:'predsim', nome:'Predsim', sub:'13 ml - Prednisolona - por 5 dias', recalculavel:true, limite:60},
      {id:'alektos', nome:'Alektos Ped', sub:'4 ml - Bilastina - por 10 dias', recalculavel:true, limite:90},
      {id:'koide-manha', nome:'Koide D', sub:'7,5 ml - Corticoide', recalculavel:false},
      {id:'inal-manha', nome:'Inalacao', sub:'SF 0,9% 3ml + Clenil - 1a do dia', recalculavel:false},
      {id:'rino-manha', nome:'Rinosoro', sub:'Lavar nariz - 1a lavagem', recalculavel:false}
    ]},
  { classe:'b-tarde', emoji:'\u{1F392}', hora:'12:00', titulo:'Antes da escola',
    itens:[
      {id:'brond-manha', nome:'Brondilat XPE', sub:'7,5 ml - a cada 12h - por 5 dias', recalculavel:false},
      {id:'koide-meio', nome:'Koide D (so dias 1 e 2)', sub:'7,5 ml - apenas 2 primeiros dias', recalculavel:false}
    ]},
  { classe:'b-escola', emoji:'\u26D4', hora:'13h-18h', titulo:'Na escola', aviso:true },
  { classe:'b-tarde', emoji:'\u{1F306}', hora:'18:30', titulo:'Chegou da escola',
    itens:[
      {id:'koide-tarde', nome:'Koide D', sub:'7,5 ml - conforme esquema', recalculavel:false},
      {id:'inal-tarde', nome:'Inalacao', sub:'SF 0,9% 3ml + Clenil - 2a do dia', recalculavel:false}
    ]},
  { classe:'b-noite', emoji:'\u{1F319}', hora:'21:30', titulo:'Antes de dormir',
    itens:[
      {id:'brond-noite', nome:'Brondilat XPE', sub:'7,5 ml - 2a dose (12h depois)', recalculavel:false},
      {id:'rino-noite', nome:'Rinosoro', sub:'Lavar nariz - ultima lavagem', recalculavel:false},
      {id:'avamys', nome:'Avamys (apos lavar o nariz)', sub:'1 jato cada narina - por 60 dias', recalculavel:false}
    ]}
];

function dataKey(d){ var dt=d||new Date(); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function horaAtual(){ var d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function mudarDia(o){ dataExibicao.setDate(dataExibicao.getDate()+o); render(); }

function getEstado(k){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')[k]||{}; }catch(e){ return {}; } }
function salvarEstado(k,e){ try{ var a=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); a[k]=e; localStorage.setItem(STORAGE_KEY,JSON.stringify(a)); }catch(x){} }
function getAjustes(){ try{ return JSON.parse(localStorage.getItem(AJUSTES_KEY)||'{}'); }catch(e){ return {}; } }
function salvarAjuste(d,id,h){ try{ var a=getAjustes(); if(!a[d])a[d]={}; a[d][id]=h; localStorage.setItem(AJUSTES_KEY,JSON.stringify(a)); }catch(e){} }

function calcularAtrasoMinutos(p,r){ var a=p.split(':'),b=r.split(':'); return (parseInt(b[0])*60+parseInt(b[1]))-(parseInt(a[0])*60+parseInt(a[1])); }
function calcularNovaSugestao(r,at){ var b=r.split(':'),h=parseInt(b[0]),m=parseInt(b[1]); if(at>120){h-=1;if(h<0)h+=24;} if(h>=13&&h<18){h=18;m=30;} if(h>=22||h<8){h=9;m=0;} return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }

function render(){
  var keyEx=dataKey(dataExibicao), keyHoje=dataKey(new Date());
  var txt=String(dataExibicao.getDate()).padStart(2,'0')+'/'+String(dataExibicao.getMonth()+1).padStart(2,'0');
  document.getElementById('dataHoje').textContent=(keyEx===keyHoje)?'Hoje, '+txt:txt;
  var estado=getEstado(keyEx), ajustes=getAjustes()[keyEx]||{};
  var app=document.getElementById('app'); app.innerHTML='';
  ROTINA_BASE.forEach(function(bloco){
    var div=document.createElement('div'); div.className='block '+bloco.classe;
    var html='<div class="block-header"><span>'+bloco.emoji+'</span><span class="hora">'+bloco.hora+'</span><span>'+bloco.titulo+'</span>';
    if(bloco.itens){
      var feitos=bloco.itens.filter(function(it){return estado[it.id];}).length, total=bloco.itens.length;
      html+='<span class="badge '+(feitos===total?'ok':'pend')+'">'+(feitos===total?'Completo':feitos+'/'+total)+'</span>';
    }
    html+='</div>';
    if(bloco.aviso) html+='<div class="escola-aviso">Nenhum medicamento nesse periodo</div>';
    if(bloco.koide) html+='<div class="koide-info"><strong>'+bloco.koide.split(':')[0]+':</strong>'+bloco.koide.substring(bloco.koide.indexOf(':')+1)+'</div>';
    if(bloco.itens){
      bloco.itens.forEach(function(it){
        var dado=estado[it.id];
        var doneCls=dado?' done':'', btnCls=dado?'check-btn checked':'check-btn', btnTxt=dado?'\u2713':'\u25CB';
        var doneInfo=dado?'<div class="item-done-info">\u2705 '+dado.quem+' as '+dado.hora+'</div>':'';
        var horaEx=bloco.hora, tag='';
        if(ajustes[it.id]){ horaEx=ajustes[it.id]; tag='<span class="tag-ajuste">Ajustado: '+horaEx+'</span>'; }
        html+='<div class="item'+doneCls+'"><div class="item-info"><div class="item-name">'+it.nome+' '+tag+'</div><div class="item-sub">'+it.sub+'</div>'+doneInfo+'</div>'+
          '<button type="button" class="'+btnCls+'" onclick="abrirModal(\''+it.id+'\',\''+it.nome.replace(/'/g,"\\'")+'\',\''+horaEx+'\', event)">'+btnTxt+'</button></div>';
      });
    }
    div.innerHTML=html; app.appendChild(div);
  });
}

function abrirModal(id,nome,hp,ev){
  if(ev){ev.preventDefault();ev.stopPropagation();}
  var k=dataKey(dataExibicao), e=getEstado(k);
  if(e[id]){ if(confirm('Desmarcar "'+nome+'"?')){ delete e[id]; salvarEstado(k,e); render(); } return false; }
  itemAtual=id; nomeAtual=nome; horaPrevistaAtual=hp;
  document.getElementById('modalRemedio').textContent='\u{1F48A} '+nome;
  document.getElementById('modalQuem').classList.add('show');
  return false;
}
function fecharModal(id,ev){ if(ev){ev.preventDefault();ev.stopPropagation();} document.getElementById(id).classList.remove('show'); return false; }

function confirmarAdm(quem,ev){
  if(ev){ev.preventDefault();ev.stopPropagation();}
  if(!itemAtual) return false;
  var id=itemAtual, nome=nomeAtual, hp=horaPrevistaAtual, hr=horaAtual(), k=dataKey(dataExibicao);
  fecharModal('modalQuem');
  var e=getEstado(k);
  e[id]={ quem: quem==='pai'?'Pai \u{1F468}':'Mae \u{1F469}', hora:hr, remedio:nome };
  salvarEstado(k,e);
  var cfg=null; ROTINA_BASE.forEach(function(b){ if(b.itens) b.itens.forEach(function(i){ if(i.id===id) cfg=i; }); });
  if(cfg && cfg.recalculavel && k===dataKey(new Date())){
    var at=calcularAtrasoMinutos(hp,hr);
    if(at>cfg.limite){
      var nh=calcularNovaSugestao(hr,at), da=new Date(); da.setDate(da.getDate()+1);
      ajustePendente={ id:id, novaHora:nh, dataAmanha:dataKey(da) };
      document.getElementById('textoAjuste').innerHTML='O <b>'+nome+'</b> atrasou '+Math.floor(at/60)+'h'+(at%60)+'m.<br><br>Ajustar a dose de <b>amanha</b> para <b>'+nh+'</b>?';
      document.getElementById('modalAjuste').classList.add('show');
      itemAtual=null; return false;
    }
  }
  itemAtual=null; render(); enviarNuvem(k,e);
  return false;
}
function aceitarAjuste(ev){ if(ev){ev.preventDefault();ev.stopPropagation();} if(ajustePendente){ salvarAjuste(ajustePendente.dataAmanha,ajustePendente.id,ajustePendente.novaHora); alert('\u2705 Ajuste salvo para amanha!'); } fecharModal('modalAjuste'); ajustePendente=null; var k=dataKey(dataExibicao); render(); enviarNuvem(k,getEstado(k)); }
function recusarAjuste(ev){ if(ev){ev.preventDefault();ev.stopPropagation();} fecharModal('modalAjuste'); ajustePendente=null; var k=dataKey(dataExibicao); render(); enviarNuvem(k,getEstado(k)); }

function enviarNuvem(k,estado){
  var s=document.getElementById('syncStatus'); s.className='sync-status loading'; s.innerHTML='\u23F3 Salvando...';
  var linhas=Object.keys(estado).map(function(id){ return { data:k, remedio:estado[id].remedio, horario:estado[id].hora, quem:estado[id].quem }; });
  fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify({ data:k, itens:linhas }) })
  .then(function(){ s.className='sync-status'; s.innerHTML='\u2705 Salvo na nuvem'; })
  .catch(function(){ s.className='sync-status erro'; s.innerHTML='\u26A0\uFE0F Erro ao salvar'; });
}

function baixarDaNuvem(){
  var s=document.getElementById('syncStatus'); s.className='sync-status loading'; s.innerHTML='\u{1F504} Baixando...';
  fetch(SCRIPT_URL)
  .then(function(r){ return r.json(); })
  .then(function(dados){
    var all=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    var map={}; ROTINA_BASE.forEach(function(b){ if(b.itens) b.itens.forEach(function(i){ map[i.nome]=i.id; }); });
    dados.forEach(function(linha){
      var di=String(linha.data);
      if(di.indexOf('/')>-1){ var p=di.split('/'); if(p[0].length===2) di=p[2]+'-'+p[1]+'-'+p[0]; }
      else if(di.indexOf('
